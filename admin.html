<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Admin Sorteo 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->
<link rel="stylesheet" href="css/admin.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// =========================
// CONFIGURACIÓN SUPABASE
// =========================
const SUPABASE_URL = "https://caovuekqrczqysxgnucc.supabase.co";
const SUPABASE_KEY = "sb_publishable_843ipMaoEhnMrvuF95Iq6Q_9It7qiFX";

if (!window.supabaseClient) {

  window.supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

}


// =========================
// VERIFICAR SESIÓN
// =========================
document.addEventListener("DOMContentLoaded", async () => {

  try {

    const { data, error } = await window.supabaseClient.auth.getSession();

    if (error || !data.session) {

      window.location.href = "login.html";
      return;

    }

    console.log("✅ Sesión activa");

  } catch (e) {

    window.location.href = "login.html";

  }

});


// =========================
// CERRAR SESIÓN
// =========================
async function cerrarSesion(){

  await window.supabaseClient.auth.signOut();

  window.location.href = "login.html";

}

window.cerrarSesion = cerrarSesion;

</script>

</head>


<body>


<!-- =========================
HEADER
========================= -->

<header class="admin-header">

<h1>🧑‍💼 Panel Administrativo – Sorteos</h1>

<button onclick="cerrarSesion()" class="logout">
Cerrar sesión
</button>

</header>



<!-- =========================
BARRA SUPERIOR
========================= -->

<div class="barra-sorteo">

<div class="selector">

<div id="sorteoActivoTitulo" class="sorteo-activo">
<span class="dot"></span>
Sorteo activo: —
</div>

</div>


<div class="acciones">

<button id="btnCerrarSorteo">🔒 Cerrar</button>
<button id="btnNuevoSorteo">➕ Nuevo</button>
<button id="btnToggleSorteo">⚡ Activar / Desactivar</button>

<button id="btnEliminarSorteo" class="danger">🗑️ Eliminar</button>

</div>


<div class="resumen">

👥 Compras registradas:
<strong id="totalCompras">0</strong>

<br>

🎟️ Números vendidos:
<strong id="totalNumeros">0</strong>

</div>

</div>



<!-- =========================
TABLA COMPRAS
========================= -->

<div class="table-wrapper">

<table id="tabla">

<thead>

<tr>

<th>Fecha</th>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Cantidad</th>
<th>Números</th>
<th>Voucher</th>
<th>Estado</th>
<th>Acción</th>

</tr>

</thead>

<tbody>

<!-- se llena con JS -->

</tbody>

</table>

</div>



<!-- =========================
MODAL NUEVO SORTEO
========================= -->

<div id="modalNuevoSorteo" class="modal oculto">

<div class="modal-contenido">

<h3>➕ Crear nuevo sorteo</h3>

<label for="nuevoNombreSorteo">
Nombre del sorteo
</label>

<input
type="text"
id="nuevoNombreSorteo"
placeholder="Ej: Sorteo 2 - Auto 2026"
>


<label>Premio</label>
<input
type="text"
id="nuevoPremio"
placeholder="Ej: iPhone 15 Pro Max"
>


<label>Imagen del premio (URL)</label>
<input
type="text"
id="nuevaImagen"
placeholder="https://..."
>


<label>Precio del ticket ($)</label>
<input
type="number"
id="precioTicket"
placeholder="5"
>


<label>Total de números</label>
<input
type="number"
id="totalNumeros"
value="99999"
>


<label style="display:block;margin-top:10px;">

<input type="checkbox" id="nuevoSorteoActivo">

Marcar como sorteo activo

</label>


<div class="modal-acciones">

<button id="btnGuardarSorteo">
Guardar
</button>

<button id="btnCancelarSorteo" class="danger">
Cancelar
</button>

</div>

</div>

</div>



<!-- =========================
LOADING PANEL
========================= -->

<div id="loadingPanel" class="loading oculto">
Cargando datos...
</div>



<!-- =========================
JS PANEL ADMIN
========================= -->

<script src="js/admin.js"></script>


</body>
</html>
