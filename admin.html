<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Admin Sorteo 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->
<link rel="stylesheet" href="css/admin.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// Configuración Supabase
const SUPABASE_URL = "https://caovuekqrczqysxgnucc.supabase.co";
const SUPABASE_KEY = "sb_publishable_843ipMaoEhnMrvuF95Iq6Q_9It7qiFX";

// Crear cliente global solo una vez
if (!window.supabaseClient) {

  window.supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

}


// 🔐 Verificar sesión cuando cargue
document.addEventListener("DOMContentLoaded", async () => {

  try {

    const { data, error } = await window.supabaseClient.auth.getSession();

    if (error || !data.session) {

      window.location.href = "login.html";
      return;

    }

    console.log("✅ Sesión activa");

  } catch (e) {

    window.location.href = "login.html";

  }

});


// 🚪 Cerrar sesión
async function cerrarSesion(){

  await window.supabaseClient.auth.signOut();

  window.location.href = "login.html";

}

// hacer función accesible al botón
window.cerrarSesion = cerrarSesion;

</script>

</head>

<body>

<header class="admin-header">

<h1>🧑‍💼 Panel Administrativo – Sorteos</h1>

<button onclick="cerrarSesion()" class="logout">
Cerrar sesión
</button>

</header>


<!-- SORTEO ACTIVO -->

<div id="sorteoActivoTitulo" class="sorteo-activo">
<span class="dot"></span>
Sorteo activo: —
</div>


<!-- BARRA SUPERIOR -->

<div class="barra-sorteo">

<div class="selector">



<select id="selectSorteo"></select>

</div>


<div class="acciones">

<button id="btnCerrarSorteo">🔒 Cerrar</button>

<button id="btnNuevoSorteo">➕ Nuevo</button>

<button id="btnEliminarSorteo" class="danger">🗑️ Eliminar</button>

</div>


<div class="resumen">

👥 Compras registradas:
<strong id="totalCompras">0</strong>

<br>

🎟️ Números vendidos:
<strong id="totalNumeros">0</strong>

</div>

</div>


<!-- TABLA -->

<div class="table-wrapper">

<table id="tabla">

<thead>

<tr>

<th>Fecha</th>

<th>Nombre</th>

<th>WhatsApp</th>

<th>Cantidad</th>

<th>Números</th>

<th>Voucher</th>

<th>Estado</th>

<th>Acción</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>


<!-- MODAL NUEVO SORTEO -->

<div id="modalNuevoSorteo" class="modal oculto">

<div class="modal-contenido">

<h3>➕ Crear nuevo sorteo</h3>

<label for="nuevoNombreSorteo">
Nombre del sorteo
</label>

<input
type="text"
id="nuevoNombreSorteo"
placeholder="Ej: Sorteo 2 - Auto 2026"
>

<label style="display:block;margin-top:10px;">

<input type="checkbox" id="nuevoSorteoActivo">

Marcar como sorteo activo

</label>

<div class="modal-acciones">

<button id="btnGuardarSorteo">
Guardar
</button>

<button id="btnCancelarSorteo" class="danger">
Cancelar
</button>

</div>

</div>

</div>


<!-- LOADING -->

<div id="loadingPanel" class="loading oculto">
Cargando datos...
</div>


<!-- JS ADMIN -->

<script src="js/admin.js"></script>

</body>
</html>
