<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Admin Sorteo 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->
<link rel="stylesheet" href="css/admin.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://caovuekqrczqysxgnucc.supabase.co";
const SUPABASE_KEY = "sb_publishable_843ipMaoEhnMrvuF95Iq6Q_9It7qiFX";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// 🔐 Verificar sesión cuando cargue la página
document.addEventListener("DOMContentLoaded", async () => {

  try{

    const { data, error } = await supabase.auth.getSession();

    if(error || !data.session){

      // si no hay sesión → ir a login
      window.location.href = "login.html";

    }

  }catch(e){

    window.location.href = "login.html";

  }

});

</script>

</head>

<body>

<h1>🧑‍💼 Panel Administrativo – Sorteos</h1>

<!-- SORTEO ACTIVO -->
<div id="sorteoActivoTitulo" class="sorteo-activo">
<span class="dot"></span>
Sorteo activo: —
</div>

<!-- BARRA SUPERIOR -->
<div class="barra-sorteo">

<div class="selector">
<label for="selectSorteo">🎟️ Sorteo activo:</label>
<select id="selectSorteo"></select>
</div>

<div class="acciones">
<button id="btnCerrarSorteo">🔒 Cerrar</button>
<button id="btnNuevoSorteo">➕ Nuevo</button>
<button id="btnEliminarSorteo" class="danger">🗑️ Eliminar</button>
</div>

<div class="resumen">
👥 Compras registradas: <strong id="totalCompras">0</strong>
</div>

</div>

<!-- TABLA -->
<div class="table-wrapper">

<table id="tabla">

<thead>
<tr>
<th>Fecha</th>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Cantidad</th>
<th>Números</th>
<th>Voucher</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- MODAL -->
<div id="modalNuevoSorteo" class="modal oculto">

<div class="modal-contenido">

<h3>➕ Crear nuevo sorteo</h3>

<label for="nuevoNombreSorteo">Nombre del sorteo</label>

<input
type="text"
id="nuevoNombreSorteo"
placeholder="Ej: Sorteo 2 - Auto 2026"
>

<label style="display:block;margin-top:10px;">
<input type="checkbox" id="nuevoSorteoActivo">
Marcar como sorteo activo
</label>

<div class="modal-acciones">
<button id="btnGuardarSorteo">Guardar</button>
<button id="btnCancelarSorteo" class="danger">Cancelar</button>
</div>

</div>

</div>

<!-- JS ADMIN -->
<script src="js/admin.js"></script>

</body>
</html>
